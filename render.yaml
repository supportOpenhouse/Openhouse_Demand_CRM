# Render service blueprint. Connect this repo at https://dashboard.render.com → New → Blueprint.
# All secrets are placeholders — set the actual values via Environment Group "oh-crm-secrets".

services:
  # ── 1. Web service · the FastAPI app ────────────────────────────────────
  - type: web
    name: oh-demand-crm-api
    runtime: python
    region: singapore                    # closest to Neon ap-southeast-1 + India users
    plan: starter                        # bump to standard before public launch
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_EMAIL_DOMAIN
        value: openhouse.in
      - key: FRONTEND_ORIGIN
        value: https://openhouse-demand-crm.vercel.app
      - key: API_BASE_URL
        # vercel.app origin so the OAuth redirect_uri is first-party (Vercel proxies
        # /auth/* to this backend). The cron below keeps the direct onrender URL.
        value: https://openhouse-demand-crm.vercel.app
      - key: SEED_VISITS_LIMIT
        value: "10000"                   # blueprint-managed; dashboard edits get reverted, set it here
      - key: RUN_SYNC_IN_PROCESS
        value: "0"
      # Pulled from the Environment Group below
      - fromGroup: oh-crm-secrets

  # ── 2. Cron job · sheet sync every 15 min ──────────────────────────────
  - type: cron
    name: oh-demand-crm-sheet-sync
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "*/15 * * * *"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # Hit the web service's /admin/sync endpoint with the internal token.
    # Curl is preinstalled on Render's Python runtime.
    startCommand: |
      curl -fsS -X POST \
        -H "X-Internal-Cron-Token: $INTERNAL_CRON_TOKEN" \
        "$API_BASE_URL/admin/sync"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: API_BASE_URL
        value: https://oh-demand-crm-api.onrender.com
      - fromGroup: oh-crm-secrets

  # ── 3. Cron job · AI Suggestions morning brief — 09:30 IST (04:00 UTC) ──
  # Pre-generates every active user's daily brief so it's ready at login. Runs the
  # batch IN THIS CRON CONTAINER (python -m …), NOT via the web service — the full
  # snapshot build is a few minutes of CPU and must not degrade the live app at the
  # 09:30 login peak. The GET endpoint also generates on-demand, so this is an
  # optimisation, not a hard dependency. NOTE: adding a NEW service needs a Blueprint
  # re-sync in the Render dashboard — a plain git push won't create the cron on its own.
  - type: cron
    name: oh-demand-crm-ai-suggestions
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    schedule: "0 4 * * *"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m api.generate_suggestions_cli
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - fromGroup: oh-crm-secrets

# ── Shared secrets ────────────────────────────────────────────────────────
# Define the VALUES ONCE in the Render dashboard under Environment Groups; both
# services consume the group. `sync: false` means "dashboard-managed" — the
# blueprint declares the key but NEVER sets/overwrites its value, so a blueprint
# re-sync can't blank these (an empty `value: ""` here previously could).
envVarGroups:
  - name: oh-crm-secrets
    envVars:
      - key: DATABASE_URL                    # Neon pooler URL (with ?sslmode=require)
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET                  # any 32+ char random string
        sync: false
      - key: INTERNAL_CRON_TOKEN             # any 32+ char random string
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON     # paste full JSON contents on one line
        sync: false
